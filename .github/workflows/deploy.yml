name: Deploy to GitHub Pages

# Publishes the static site whenever main changes (including the data commits made
# by the capture workflow) or on manual dispatch.
#
# Note: commits pushed by the capture workflow use GITHUB_TOKEN, which by design does
# NOT trigger the `push` event here. The `workflow_run` trigger below ensures the site
# redeploys after every capture run so cron-committed data goes live.
on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ['Capture NFL snapshot']
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
